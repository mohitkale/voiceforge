<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">VoiceForge Architecture</title>
  <desc id="desc">High-level architecture showing HTTP clients, FastAPI service, engine registry, cloning engines, SQLite, and local storage.</desc>
  <defs>
    <marker id="m" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#86a8e7"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="820" fill="#0b1220"/>
  <text x="40" y="52" fill="#ffffff" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="28" font-weight="700">VoiceForge: System Architecture</text>

  <rect x="40" y="80" width="1120" height="700" rx="12" fill="#131c2f" stroke="#2d3d63" stroke-width="2"/>

  <rect x="70" y="120" width="280" height="130" rx="10" fill="#1b2945" stroke="#4b6aa5" stroke-width="2"/>
  <text x="95" y="165" fill="#e6edf7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">HTTP Clients</text>
  <text x="95" y="195" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Reel Studio / curl / custom apps</text>
  <text x="95" y="218" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">REST + SSE (Bearer auth)</text>

  <rect x="420" y="110" width="360" height="150" rx="10" fill="#1b2945" stroke="#4b6aa5" stroke-width="2"/>
  <text x="445" y="150" fill="#e6edf7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">FastAPI Service</text>
  <text x="445" y="180" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">/v1/voices, /v1/synthesize, /v1/engines</text>
  <text x="445" y="203" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Jobs queue + SSE progress</text>
  <text x="445" y="226" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Preprocess, watermark, metrics</text>

  <rect x="850" y="120" width="270" height="130" rx="10" fill="#1b2945" stroke="#4b6aa5" stroke-width="2"/>
  <text x="875" y="165" fill="#e6edf7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">Engine Registry</text>
  <text x="875" y="195" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">CloneEngine protocol</text>
  <text x="875" y="218" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Lazy singletons per engine id</text>

  <path d="M350 185 H420" stroke="#86a8e7" stroke-width="3" fill="none" marker-end="url(#m)"/>
  <path d="M780 185 H850" stroke="#86a8e7" stroke-width="3" fill="none" marker-end="url(#m)"/>

  <rect x="70" y="320" width="1060" height="250" rx="10" fill="#1b2945" stroke="#4b6aa5" stroke-width="2"/>
  <text x="95" y="360" fill="#e6edf7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">Cloning Engines</text>
  <text x="95" y="390" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">In-process: openvoice-v2 À f5-tts À xtts-v2 À qwen3-tts</text>
  <text x="95" y="418" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Workers: rvc À chatterbox À cosyvoice-3 À indextts-2</text>
  <text x="95" y="446" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">Sidecar: fish-speech (VOICEFORGE_FISH_SPEECH_URL)</text>
  <text x="95" y="484" fill="#86a8e7" font-family="Menlo, Consolas, monospace" font-size="13">Consent required À licences vary per model ù see NOTICE.md</text>

  <rect x="70" y="610" width="480" height="130" rx="10" fill="#1b2945" stroke="#4b6aa5" stroke-width="2"/>
  <text x="95" y="655" fill="#e6edf7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">SQLite</text>
  <text x="95" y="685" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">voices À samples metadata À consent flag</text>

  <rect x="610" y="610" width="520" height="130" rx="10" fill="#1b2945" stroke="#4b6aa5" stroke-width="2"/>
  <text x="635" y="655" fill="#e6edf7" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">Local disk</text>
  <text x="635" y="685" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">data/voices/{id}/samples À artifacts À preview.wav</text>
  <text x="635" y="710" fill="#b6c3db" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="13">models/ or Docker models-cache volume</text>

  <path d="M600 250 V320" stroke="#86a8e7" stroke-width="3" fill="none" marker-end="url(#m)"/>
  <path d="M310 570 V610" stroke="#86a8e7" stroke-width="3" fill="none" marker-end="url(#m)"/>
  <path d="M870 570 V610" stroke="#86a8e7" stroke-width="3" fill="none" marker-end="url(#m)"/>
</svg>
