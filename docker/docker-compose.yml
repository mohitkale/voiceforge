x-common: &common
  env_file:
    # Optional: copy .env.example -> .env at the repo root to set
    # VOICEFORGE_API_TOKEN, CORS origins, etc. Compose runs fine without it
    # (pure localhost/dev defaults apply), but see README before exposing
    # this beyond localhost.
    - path: ../.env
      required: false
  ports:
    - "127.0.0.1:8089:8089"
  volumes:
    - ../data:/app/data
    - models-cache:/app/models
  restart: unless-stopped
  # Keep the Mac host safe: cap CPU/RAM so a runaway model load can't thrash
  # the laptop. Tune up if you have headroom.
  mem_limit: 6g
  cpus: 4.0
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  pids_limit: 512

services:
  # Default (CPU) profile — recommended on macOS (no NVIDIA GPU required):
  #   docker compose -f docker/docker-compose.yml --profile cpu up --build
  # Then open http://localhost:8089/  (studio UI) and /docs (OpenAPI).
  voiceforge-cpu:
    <<: *common
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    profiles: ["cpu"]

  # One-shot model pre-download (populates the models-cache volume):
  #   docker compose -f docker/docker-compose.yml --profile cpu run --rm voiceforge-download
  voiceforge-download:
    <<: *common
    build:
      context: ..
      dockerfile: docker/Dockerfile.cpu
    profiles: ["cpu"]
    restart: "no"
    ports: []
    entrypoint: ["python", "scripts/download_models.py"]
    environment:
      COQUI_TOS_AGREED: "1"

  # Fish Speech is intentionally not launched here. The former mutable
  # `latest-server-cpu` image made builds irreproducible. Run a separately
  # verified digest-pinned sidecar on a private Docker network, then opt in
  # with VOICEFORGE_FISH_SPEECH_URL.

  # GPU profile: `docker compose --profile gpu up voiceforge-gpu`
  # Requires the NVIDIA Container Toolkit on the host (not available on typical Macs).
  voiceforge-gpu:
    <<: *common
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    profiles: ["gpu"]
    mem_limit: 12g
    cpus: 8.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  models-cache:
