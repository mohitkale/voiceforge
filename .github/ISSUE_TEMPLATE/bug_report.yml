name: Bug report
description: Something is broken in VoiceForge
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Do not attach:** private voice samples, generated impersonation audio, API tokens,
        unredacted databases, copyrighted datasets, model weights you cannot redistribute,
        or consent evidence containing personal data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps without private audio. Prefer the synthetic fixture path if relevant.
    validations:
      required: true
  - type: dropdown
    id: engine
    attributes:
      label: Engine (if applicable)
      options:
        - openvoice-v2
        - f5-tts
        - xtts-v2
        - chatterbox
        - qwen3-tts
        - rvc
        - fish-speech
        - cosyvoice-3
        - indextts-2
        - n/a (API / Studio / Docker)
  - type: input
    id: version
    attributes:
      label: VoiceForge version / commit
      placeholder: e.g. 0.3.0 or git SHA
  - type: dropdown
    id: hardware
    attributes:
      label: Hardware path
      options:
        - CPU Docker
        - GPU Docker
        - Local Python
        - Modal / cloud GPU
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Logs (redacted)
      description: Paste relevant log lines with secrets removed.
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I did not upload private voice samples, tokens, or personal data
          required: true
        - label: I read RESPONSIBLE_USE.md and SECURITY.md where relevant
          required: true
