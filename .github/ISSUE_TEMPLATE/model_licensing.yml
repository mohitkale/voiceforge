name: Model licensing clarification
description: Flag unclear or incorrect engine/model licence documentation
title: "[licensing] "
labels: ["licensing"]
body:
  - type: markdown
    attributes:
      value: |
        Help keep NOTICE.md / docs/ENGINE_LICENSING.md accurate. This is not legal advice.
        Do not paste copyrighted datasets or redistributable-restricted weights into the issue.
  - type: dropdown
    id: engine
    attributes:
      label: Engine
      options:
        - openvoice-v2
        - f5-tts
        - xtts-v2
        - chatterbox
        - qwen3-tts
        - rvc
        - fish-speech
        - cosyvoice-3
        - indextts-2
        - other / multiple
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What is inaccurate or unclear?
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Upstream sources
      description: Links to model cards, licence files, or NOTICE entries.
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I did not upload model weights or private audio
          required: true
